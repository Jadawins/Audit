<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — AuditMS</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/auditms.css">
<style>
  body { background:var(--bg); color:var(--text); font-family:var(--sans); }

  /* Login */
  .admin-login { display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .admin-login-box { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:2.5rem; width:100%; max-width:360px; }
  .admin-login-box h2 { font-size:1.1rem; margin-bottom:1.5rem; }
  .admin-input { width:100%; padding:.65rem .85rem; background:var(--bg2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:.85rem; font-family:var(--sans); box-sizing:border-box; margin-bottom:.75rem; }
  .admin-input:focus { outline:none; border-color:var(--accent); }

  /* App */
  #admin-app { display:none; max-width:1100px; margin:0 auto; padding:2rem 1.5rem; }
  .admin-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:2rem; }
  .admin-header h1 { font-size:1.2rem; font-weight:600; }

  /* Stats */
  .admin-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; margin-bottom:2rem; }
  .stat-card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:1.25rem; }
  .stat-val { font-size:1.8rem; font-weight:600; color:var(--accent); font-family:var(--mono); }
  .stat-lbl { font-size:.72rem; color:var(--text2); margin-top:.25rem; }

  /* Lead cards */
  .lead-card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:1.25rem; margin-bottom:1rem; }
  .lead-top { display:grid; grid-template-columns:1fr auto; gap:1rem; align-items:start; }
  .lead-name { font-weight:600; font-size:.95rem; }
  .lead-meta { font-size:.75rem; color:var(--text2); margin-top:.2rem; }
  .lead-meta a { color:var(--accent); text-decoration:none; }
  .lead-scores { display:flex; gap:.5rem; flex-wrap:wrap; margin-top:.75rem; }
  .score-badge { display:inline-flex; align-items:center; gap:.35rem; padding:.25rem .65rem; border-radius:6px; font-size:.72rem; font-family:var(--mono); }
  .score-good { background:#22c55e18; color:#22c55e; border:1px solid #22c55e30; }
  .score-mid  { background:#f59e0b18; color:#f59e0b; border:1px solid #f59e0b30; }
  .score-bad  { background:#ef444418; color:#ef4444; border:1px solid #ef444430; }
  .score-lbl  { font-size:.65rem; opacity:.8; font-family:var(--sans); }

  /* Alertes */
  .lead-alerts { margin-top:.75rem; display:flex; align-items:center; gap:.5rem; flex-wrap:wrap; }
  .alert-count { display:inline-flex; align-items:center; gap:.3rem; padding:.2rem .55rem; border-radius:5px; font-size:.72rem; cursor:pointer; border:none; font-family:var(--sans); }
  .alert-count-red    { background:#ef444418; color:#ef4444; }
  .alert-count-orange { background:#f59e0b18; color:#f59e0b; }
  .alert-list { display:none; margin-top:.5rem; width:100%; }
  .alert-list.open { display:block; }
  .alert-item { font-size:.72rem; padding:.25rem 0; border-bottom:1px solid var(--border); color:var(--text2); }
  .alert-item:last-child { border:none; }

  /* Actions */
  .lead-actions { display:flex; gap:.4rem; align-items:center; flex-wrap:wrap; justify-content:flex-end; }
  .btn-theme { background:none; border:1px solid var(--border); color:var(--text2); border-radius:6px; padding:.3rem .7rem; font-size:.72rem; cursor:pointer; font-family:var(--sans); white-space:nowrap; }
  .btn-theme:hover { border-color:var(--accent); color:var(--accent); }
  .btn-theme.entra  { border-color:#3b82f630; color:var(--acc2); }
  .btn-theme.entra:hover  { background:#3b82f618; }
  .btn-theme.intune { border-color:#22c55e30; color:var(--green); }
  .btn-theme.intune:hover { background:#22c55e18; }
  .btn-theme.o365   { border-color:#f59e0b30; color:var(--orange); }
  .btn-theme.o365:hover   { background:#f59e0b18; }
  .btn-delete { background:none; border:1px solid #ef444430; color:#ef4444; border-radius:6px; padding:.3rem .7rem; font-size:.72rem; cursor:pointer; font-family:var(--sans); }
  .btn-delete:hover { background:#ef444418; }

  .commentaire-box { font-size:.75rem; color:var(--text2); font-style:italic; margin-top:.75rem; padding:.5rem .75rem; background:var(--bg2); border-radius:6px; border-left:2px solid var(--border); }

  /* Modale thème */
  .theme-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:1000; overflow-y:auto; padding:2rem 1rem; }
  .theme-overlay.active { display:block; }
  .theme-modal { background:var(--card); border:1px solid var(--border); border-radius:14px; max-width:900px; margin:0 auto; overflow:hidden; }
  .theme-modal-head { display:flex; align-items:center; justify-content:space-between; padding:1.25rem 1.5rem; border-bottom:1px solid var(--border); }
  .theme-modal-title { font-size:1rem; font-weight:600; }
  .theme-modal-sub { font-size:.75rem; color:var(--text2); margin-top:.15rem; }
  .theme-modal-body { padding:1.5rem; }
  .theme-section { margin-bottom:1.75rem; }
  .theme-section-title { font-size:.7rem; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:.06em; margin-bottom:.75rem; padding-bottom:.4rem; border-bottom:1px solid var(--border); }
  .theme-empty { color:var(--text2); font-size:.78rem; padding:.5rem 0; }

  /* Tables dans la modale */
  .dt { width:100%; border-collapse:collapse; font-size:.78rem; }
  .dt th { text-align:left; padding:.5rem .75rem; border-bottom:1px solid var(--border); color:var(--text2); font-weight:500; white-space:nowrap; }
  .dt td { padding:.5rem .75rem; border-bottom:1px solid var(--border); }
  .dt tr:last-child td { border:none; }
  .dt tr:hover td { background:var(--bg2); }
  .tag-sm { display:inline-block; padding:.1rem .4rem; border-radius:3px; font-size:.65rem; }
  .tag-red    { background:#ef444418; color:#ef4444; }
  .tag-orange { background:#f59e0b18; color:#f59e0b; }
  .tag-green  { background:#22c55e18; color:#22c55e; }
  .tag-gray   { background:var(--bg2); color:var(--text2); }

  .err { color:var(--red); font-size:.8rem; margin-top:.5rem; }
  .pagination { display:flex; gap:.5rem; margin-top:1.5rem; justify-content:center; }
  .empty-state { text-align:center; color:var(--text2); padding:3rem; font-size:.85rem; }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="admin-login" id="admin-login">
  <div class="admin-login-box">
    <h2>AUDIT <span style="color:var(--accent)">MS</span> · Admin</h2>
    <input class="admin-input" type="password" id="admin-pwd" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')adminLogin()">
    <button class="btn-primary" style="width:100%" onclick="adminLogin()">Connexion</button>
    <div class="err" id="admin-err"></div>
  </div>
</div>

<!-- APP -->
<div id="admin-app">
  <div class="admin-header">
    <h1>AUDIT <span style="color:var(--accent)">MS</span> · Admin</h1>
    <button class="btn-sm" onclick="adminLogout()">Déconnexion</button>
  </div>
  <div class="admin-stats" id="admin-stats"></div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
    <span style="font-weight:500;font-size:.9rem" id="leads-title">Leads</span>
    <button class="btn-sm" onclick="loadLeads(0)">↺ Actualiser</button>
  </div>
  <div id="leads-list"></div>
  <div class="pagination" id="pagination"></div>
</div>

<!-- MODALE THÈME -->
<div class="theme-overlay" id="theme-overlay" onclick="if(event.target===this)closeTheme()">
  <div class="theme-modal">
    <div class="theme-modal-head">
      <div>
        <div class="theme-modal-title" id="tm-title"></div>
        <div class="theme-modal-sub" id="tm-sub"></div>
      </div>
      <button class="btn-sm" onclick="closeTheme()">✕ Fermer</button>
    </div>
    <div class="theme-modal-body" id="tm-body"></div>
  </div>
</div>

<script>
const API = "https://auditms.fr/api";
let _token = null;
let _currentSkip = 0;
const PAGE_SIZE = 50;

// ── Auth ──────────────────────────────────────────────────────────────────────
async function adminLogin() {
  const pwd = document.getElementById("admin-pwd").value;
  const err = document.getElementById("admin-err");
  err.textContent = "";
  try {
    const r = await fetch(API + "/admin/login", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ password: pwd })
    });
    const data = await r.json();
    if (!r.ok) { err.textContent = data.error || "Erreur"; return; }
    _token = data.token;
    sessionStorage.setItem("admin-token", _token);
    showApp();
  } catch { err.textContent = "Impossible de se connecter."; }
}
function adminLogout() {
  _token = null; sessionStorage.removeItem("admin-token");
  document.getElementById("admin-login").style.display = "flex";
  document.getElementById("admin-app").style.display   = "none";
}
function showApp() {
  document.getElementById("admin-login").style.display = "none";
  document.getElementById("admin-app").style.display   = "block";
  loadLeads(0);
}

// ── Leads ─────────────────────────────────────────────────────────────────────
async function loadLeads(skip) {
  _currentSkip = skip;
  const list = document.getElementById("leads-list");
  list.innerHTML = '<div class="empty-state">Chargement...</div>';
  try {
    const r = await fetch(API + "/admin/leads?limit=" + PAGE_SIZE + "&skip=" + skip, {
      headers: { Authorization: "Bearer " + _token }
    });
    if (r.status === 401) { adminLogout(); return; }
    const { leads } = await r.json();
    renderStats(leads);
    renderLeads(leads);
    renderPagination(leads.length);
  } catch {
    list.innerHTML = '<div class="empty-state" style="color:var(--red)">Erreur de chargement.</div>';
  }
}

function renderStats(leads) {
  const today  = new Date().toISOString().slice(0,10);
  const todayN = leads.filter(l => new Date(l.createdAt).toISOString().slice(0,10) === today).length;
  const scores = leads.flatMap(l => l.scores ? Object.values(l.scores).filter(v => typeof v==="number") : []);
  const avg    = scores.length ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) : null;
  document.getElementById("admin-stats").innerHTML = `
    <div class="stat-card"><div class="stat-val">${leads.length}</div><div class="stat-lbl">Leads (page)</div></div>
    <div class="stat-card"><div class="stat-val">${todayN}</div><div class="stat-lbl">Aujourd'hui</div></div>
    <div class="stat-card"><div class="stat-val">${avg !== null ? avg : "—"}</div><div class="stat-lbl">Score moyen</div></div>
  `;
}

function _scoreBadge(label, v) {
  if (v == null) return "";
  const cls = v >= 80 ? "score-good" : v >= 60 ? "score-mid" : "score-bad";
  return `<span class="score-badge ${cls}"><span class="score-lbl">${label}</span>${v}/100</span>`;
}

function renderLeads(leads) {
  const list = document.getElementById("leads-list");
  document.getElementById("leads-title").textContent = "Leads (" + leads.length + ")";
  if (!leads.length) { list.innerHTML = '<div class="empty-state">Aucun lead pour le moment.</div>'; return; }
  list.innerHTML = leads.map((l, i) => {
    const date    = new Date(l.createdAt).toLocaleString("fr-FR", {day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
    const scores  = l.scores ? Object.entries(l.scores).map(([k,v]) => _scoreBadge(k,v)).join("") : "";
    const redN    = (l.alerts||[]).filter(a=>a.lvl==="red").length;
    const orangeN = (l.alerts||[]).filter(a=>a.lvl==="orange").length;
    const alertBtns = [
      redN    ? `<button class="alert-count alert-count-red"    onclick="toggleAlerts('al-${i}')">🔴 ${redN} critique${redN>1?"s":""}</button>` : "",
      orangeN ? `<button class="alert-count alert-count-orange" onclick="toggleAlerts('al-${i}')">🟡 ${orangeN} avertissement${orangeN>1?"s":""}</button>` : "",
      (!redN && !orangeN) ? `<span style="font-size:.72rem;color:var(--text2)">Aucune alerte</span>` : ""
    ].join("");
    const alertList = (l.alerts||[]).map(a => `<div class="alert-item">${a.lvl==="red"?"🔴":"🟡"} ${a.msg}</div>`).join("");
    const d = l.details || {};
    const hasEntra  = d.noMfaUsers?.length || d.weakMfaUsers?.length || d.inactiveUsers?.length || d.globalAdmins?.length;
    const hasIntune = d.nonCompliant?.length;
    const hasO365   = d.wastedLicenses?.length || d.inboxRules?.length || d.riskyOAuthApps?.length || d.adminsWithMailbox?.length;

    return `<div class="lead-card" id="card-${i}">
      <div class="lead-top">
        <div>
          <div class="lead-name">${l.prenom} ${l.nom}${l.societe ? ` · <span style="font-weight:400;color:var(--text2)">${l.societe}</span>` : ""}</div>
          <div class="lead-meta">
            <a href="mailto:${l.email}">${l.email}</a>${l.telephone ? ` · ${l.telephone}` : ""} · ${date}
          </div>
        </div>
        <div class="lead-actions">
          ${hasEntra  ? `<button class="btn-theme entra"  onclick="openTheme(${i},'entra')">Entra ID</button>` : ""}
          ${hasIntune ? `<button class="btn-theme intune" onclick="openTheme(${i},'intune')">Intune</button>` : ""}
          ${hasO365   ? `<button class="btn-theme o365"   onclick="openTheme(${i},'o365')">Microsoft 365</button>` : ""}
          <button class="btn-delete" onclick="deleteLead('${l._id}',${i})">Supprimer</button>
        </div>
      </div>
      ${scores ? `<div class="lead-scores">${scores}</div>` : ""}
      <div class="lead-alerts">${alertBtns}</div>
      <div class="alert-list" id="al-${i}">${alertList}</div>
      ${l.commentaire ? `<div class="commentaire-box">"${l.commentaire}"</div>` : ""}
    </div>`;
  }).join("");

  // Stocker les leads pour la modale
  window._leads = leads;
}

function toggleAlerts(id) { document.getElementById(id)?.classList.toggle("open"); }

// ── Modale thème ──────────────────────────────────────────────────────────────
function openTheme(i, theme) {
  const l = window._leads[i];
  const d = l.details || {};
  const overlay = document.getElementById("theme-overlay");
  const contact = `${l.prenom} ${l.nom}${l.societe ? " · " + l.societe : ""}`;

  let title, sub, body = "";

  if (theme === "entra") {
    const scoreVal = l.scores?.["Entra ID"] ?? l.scores?.["entra"] ?? null;
    title = "Entra ID";
    sub   = contact + (scoreVal !== null ? " · Score " + scoreVal + "/100" : "");
    body += _tableSection("Utilisateurs sans MFA", d.noMfaUsers, [
      { h:"Nom",   fn: u => u.name },
      { h:"UPN",   fn: u => `<span style="font-family:var(--mono);font-size:.72rem">${u.upn}</span>` },
      { h:"Statut",fn: () => `<span class="tag-sm tag-red">Sans MFA</span>` }
    ]);
    body += _tableSection("MFA faible (SMS/appel)", d.weakMfaUsers, [
      { h:"Nom", fn: u => u.name },
      { h:"UPN", fn: u => `<span style="font-family:var(--mono);font-size:.72rem">${u.upn}</span>` },
      { h:"Statut", fn: () => `<span class="tag-sm tag-orange">MFA faible</span>` }
    ]);
    body += _tableSection("Comptes inactifs >90 jours", d.inactiveUsers, [
      { h:"Nom", fn: u => u.name },
      { h:"UPN", fn: u => `<span style="font-family:var(--mono);font-size:.72rem">${u.upn}</span>` }
    ]);
    body += _tableSection("Administrateurs globaux", d.globalAdmins, [
      { h:"Nom", fn: u => u.name },
      { h:"UPN", fn: u => `<span style="font-family:var(--mono);font-size:.72rem">${u.upn}</span>` }
    ]);
  }

  if (theme === "intune") {
    const scoreVal = l.scores?.["Intune"] ?? l.scores?.["intune"] ?? null;
    title = "Intune";
    sub   = contact + (scoreVal !== null ? " · Score " + scoreVal + "/100" : "");
    body += _tableSection("Appareils non conformes", d.nonCompliant, [
      { h:"Appareil",fn: x => x.name },
      { h:"Utilisateur", fn: x => x.user || "—" },
      { h:"OS",      fn: x => x.os || "—" },
      { h:"Version", fn: x => x.osVersion || "—" },
      { h:"Statut",  fn: () => `<span class="tag-sm tag-red">Non conforme</span>` }
    ]);
  }

  if (theme === "o365") {
    const scoreVal = l.scores?.["Microsoft 365"] ?? l.scores?.["o365"] ?? null;
    title = "Microsoft 365";
    sub   = contact + (scoreVal !== null ? " · Score " + scoreVal + "/100" : "");
    body += _tableSection("Licences gaspillées", d.wastedLicenses, [
      { h:"Nom",    fn: u => u.name },
      { h:"UPN",    fn: u => `<span style="font-family:var(--mono);font-size:.72rem">${u.upn}</span>` },
      { h:"Raison", fn: u => `<span class="tag-sm tag-orange">${u.reason||"—"}</span>` }
    ]);
    body += _tableSection("Règles inbox suspectes", d.inboxRules, [
      { h:"Règle",  fn: r => r.name || "—" },
      { h:"UPN",    fn: r => `<span style="font-family:var(--mono);font-size:.72rem">${r.upn||"—"}</span>` },
      { h:"Flags",  fn: r => (r.flags||[]).map(f=>`<span class="tag-sm tag-red">${f}</span>`).join(" ") || "—" }
    ]);
    body += _tableSection("Applications OAuth risquées", d.riskyOAuthApps, [
      { h:"Application", fn: a => a.name || "—" },
      { h:"Éditeur",     fn: a => a.publisher || `<span style="color:var(--text2)">Inconnu</span>` }
    ]);
    body += _tableSection("Admins globaux avec boîte mail", d.adminsWithMailbox, [
      { h:"Nom", fn: u => u.name },
      { h:"UPN", fn: u => `<span style="font-family:var(--mono);font-size:.72rem">${u.upn}</span>` }
    ]);
  }

  document.getElementById("tm-title").textContent = title;
  document.getElementById("tm-sub").textContent   = sub;
  document.getElementById("tm-body").innerHTML    = body || '<div class="theme-empty">Aucune donnée.</div>';
  overlay.classList.add("active");
  document.body.style.overflow = "hidden";
}

function closeTheme() {
  document.getElementById("theme-overlay").classList.remove("active");
  document.body.style.overflow = "";
}

function _tableSection(title, items, cols) {
  if (!items?.length) return "";
  const thead = cols.map(c => `<th>${c.h}</th>`).join("");
  const tbody = items.map(item =>
    `<tr>${cols.map(c => `<td>${c.fn(item)}</td>`).join("")}</tr>`
  ).join("");
  return `<div class="theme-section">
    <div class="theme-section-title">${title} <span style="font-weight:400;opacity:.6">(${items.length})</span></div>
    <table class="dt"><thead><tr>${thead}</tr></thead><tbody>${tbody}</tbody></table>
  </div>`;
}

// ── Suppression ───────────────────────────────────────────────────────────────
async function deleteLead(id, i) {
  if (!confirm("Supprimer ce lead ?")) return;
  try {
    const r = await fetch(API + "/admin/leads/" + id, {
      method:"DELETE", headers:{ Authorization:"Bearer " + _token }
    });
    if (r.status === 401) { adminLogout(); return; }
    if (!r.ok) { alert("Erreur lors de la suppression."); return; }
    document.getElementById("card-" + i)?.remove();
  } catch { alert("Impossible de supprimer."); }
}

function renderPagination(count) {
  const pg   = document.getElementById("pagination");
  const prev = _currentSkip > 0;
  const next = count === PAGE_SIZE;
  if (!prev && !next) { pg.innerHTML = ""; return; }
  pg.innerHTML = `
    ${prev ? `<button class="btn-sm" onclick="loadLeads(${_currentSkip-PAGE_SIZE})">← Précédent</button>` : ""}
    ${next  ? `<button class="btn-sm" onclick="loadLeads(${_currentSkip+PAGE_SIZE})">Suivant →</button>` : ""}
  `;
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.addEventListener("keydown", e => { if (e.key === "Escape") closeTheme(); });
const saved = sessionStorage.getItem("admin-token");
if (saved) { _token = saved; showApp(); }
</script>
</body>
</html>
